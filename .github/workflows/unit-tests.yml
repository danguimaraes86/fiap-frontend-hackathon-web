name: Run Unit Tests

on:
  pull_request:
    branches:
      - deploy
  workflow_dispatch:
    inputs:
      staging:
        description: 'Ambiente de execução'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    env:
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      STAGING: ${{ github.event.inputs.staging || 'development' }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar Angular CLI Global
        run: npm install -g @angular/cli@21.1.1

      - name: Instalar dependências do projeto
        run: npm ci

      - name: Gerar arquivos de ambiente
        run: node --env-file-if-exists=.env src/environments/generate-environment.js

      - name: Executar Testes Unitários
        run: ng test
